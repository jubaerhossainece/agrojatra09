services:
  agrojatra:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GIT_SHA: ${GIT_SHA:-unknown}
    image: agrojatra09:latest
    container_name: agrojatra09
    restart: unless-stopped
    ports:
      - "8080:8080"

    # On Linux, "host-gateway" resolves to the Docker bridge IP (172.17.0.1)
    # so the container can reach MySQL running on the host machine.
    # Inside the container, use DB_HOST=host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"

    volumes:
      # Persist uploaded files across container restarts/rebuilds
      - agrojatra_storage:/var/www/html/storage/app
      # Persist logs
      - agrojatra_logs:/var/www/html/storage/logs

    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: http://localhost:8080

      # DB lives on the host — host.docker.internal resolves via extra_hosts above
      DB_CONNECTION: mysql
      DB_HOST: host.docker.internal
      DB_PORT: ${DB_PORT:-3306}
      DB_DATABASE: ${DB_DATABASE:-agrojatra09}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}

volumes:
  agrojatra_storage:
  agrojatra_logs:
